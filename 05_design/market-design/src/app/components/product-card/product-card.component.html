<div class="card">
  <div class="card-header">
    <h4 class="card-title">{{ product.name }}</h4>
  </div>
  <div class="card-content">
    <p class="card-description">{{ product.description }}</p>
    <div class="card-meta">
      <span class="card-price">${{ product.price.toFixed(2) }}</span>
      <span class="card-stock">Stock: {{ product.stock }}</span>
    </div>
  </div>
  <div class="card-actions">
    <button
      class="btn btn-add-cart"
      [disabled]="product.stock === 0"
      [title]="product.stock === 0 ? 'Out of stock' : 'Add to cart'"
      (click)="addToCart.emit(product)"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="btn btn-outline" (click)="view.emit(product)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      View
    </button>
    <button class="btn btn-outline" (click)="edit.emit(product)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit
    </button>
    <button class="btn btn-danger" (click)="delete.emit(product)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>
</div>
