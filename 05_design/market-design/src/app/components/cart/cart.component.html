<div class="cart-panel">
  <div class="cart-header">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/>
      <circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span class="cart-title">Cart</span>
    @if (totalCount > 0) {
      <span class="cart-badge">{{ totalCount }}</span>
    }
  </div>

  @if (cartItems.length === 0) {
    <p class="cart-empty">Empty</p>
  } @else {
    <ul class="cart-list">
      @for (item of cartItems; track item.id) {
        <li class="cart-item">
          <div class="cart-item-info">
            <span class="cart-item-name">{{ item.product_name }}</span>
            <span class="cart-item-qty">×{{ item.quantity }}</span>
          </div>
          <div class="cart-item-right">
            <span class="cart-item-price">${{ (item.product_price * item.quantity).toFixed(2) }}</span>
            <button class="cart-remove" (click)="remove.emit(item.product_id)" title="Remove">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </li>
      }
    </ul>
    <div class="cart-total">
      <span>Total</span>
      <span>${{ totalPrice.toFixed(2) }}</span>
    </div>
  }
</div>
